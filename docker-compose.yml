services:
  shareholder-1:
    build: .
    command: shareholder
    environment:
      PORT: "50051"
      MIN_CLIENTS: "${MIN_CLIENTS:-10}"

  shareholder-2:
    build: .
    command: shareholder
    environment:
      PORT: "50051"
      MIN_CLIENTS: "${MIN_CLIENTS:-10}"

  shareholder-3:
    build: .
    command: shareholder
    environment:
      PORT: "50051"
      MIN_CLIENTS: "${MIN_CLIENTS:-10}"

  aggregator:
    build: .
    command: aggregator
    ports:
      - "${AGGREGATOR_PORT:-50052}:50052"
    environment:
      PORT: "50052"
      SHAREHOLDERS: "shareholder-1:50051,shareholder-2:50051,shareholder-3:50051"
      THRESHOLD: "${THRESHOLD:-2}"
      N_BINS: "${N_BINS:-10}"
      N_TREES: "${N_TREES:-15}"
      MAX_DEPTH: "${MAX_DEPTH:-3}"
      LEARNING_RATE: "${LEARNING_RATE:-0.15}"
      LAMBDA_REG: "${LAMBDA_REG:-2.0}"
      MIN_CLIENTS: "${MIN_CLIENTS:-10}"
      LOSS: "${LOSS:-squared}"
      FEATURES: "${FEATURES:-age,sex,cp,trestbps,chol,fbs,restecg,thalach,exang,oldpeak,slope,ca,thal}"
      TARGET_COLUMN: "${TARGET_COLUMN:-target}"
      TARGET_COUNT: "${TARGET_COUNT:-}"
    depends_on:
      - shareholder-1
      - shareholder-2
      - shareholder-3
