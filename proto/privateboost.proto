syntax = "proto3";
package privateboost;

// -- Shared messages --

enum DType {
  FLOAT64 = 0;
  FLOAT32 = 1;
  INT32 = 2;
  INT64 = 3;
}

message NdArray {
  DType dtype = 1;
  repeated int64 shape = 2;
  bytes data = 3;
}

message Share {
  int32 x = 1;
  NdArray y = 2;
}

// -- ShareholderService --

service ShareholderService {
  rpc SubmitStats(SubmitStatsRequest) returns (SubmitStatsResponse);
  rpc SubmitGradients(SubmitGradientsRequest) returns (SubmitGradientsResponse);

  rpc GetStatsCommitments(GetStatsCommitmentsRequest) returns (GetStatsCommitmentsResponse);
  rpc GetGradientCommitments(GetGradientCommitmentsRequest) returns (GetGradientCommitmentsResponse);
  rpc GetGradientNodeIds(GetGradientNodeIdsRequest) returns (GetGradientNodeIdsResponse);
  rpc GetStatsSum(GetStatsSumRequest) returns (GetStatsSumResponse);
  rpc GetGradientsSum(GetGradientsSumRequest) returns (GetGradientsSumResponse);

  rpc SubmitResult(SubmitResultRequest) returns (SubmitResultResponse);
  rpc GetConsensusBins(GetConsensusBinsRequest) returns (GetConsensusBinsResponse);
  rpc GetConsensusSplits(GetConsensusSplitsRequest) returns (GetConsensusSplitsResponse);
  rpc GetConsensusModel(GetConsensusModelRequest) returns (GetConsensusModelResponse);
  rpc GetRunState(GetRunStateRequest) returns (GetRunStateResponse);
}

message SubmitStatsRequest {
  string run_id = 1;
  bytes commitment = 2;
  Share share = 3;
}
message SubmitStatsResponse {}

message SubmitGradientsRequest {
  string run_id = 1;
  int32 round_id = 2;
  int32 depth = 3;
  bytes commitment = 4;
  Share share = 5;
  int32 node_id = 6;
}
message SubmitGradientsResponse {}

message GetStatsCommitmentsRequest {
  string run_id = 1;
}
message GetStatsCommitmentsResponse {
  repeated bytes commitments = 1;
}

message GetGradientCommitmentsRequest {
  string run_id = 1;
  int32 round_id = 2;
  int32 depth = 3;
}
message GetGradientCommitmentsResponse {
  repeated bytes commitments = 1;
}

message GetGradientNodeIdsRequest {
  string run_id = 1;
  int32 round_id = 2;
  int32 depth = 3;
}
message GetGradientNodeIdsResponse {
  repeated int32 node_ids = 1;
}

message GetStatsSumRequest {
  string run_id = 1;
  repeated bytes commitments = 2;
}
message GetStatsSumResponse {
  NdArray sum = 1;
}

message GetGradientsSumRequest {
  string run_id = 1;
  int32 round_id = 2;
  int32 depth = 3;
  repeated bytes commitments = 4;
  int32 node_id = 5;
}
message GetGradientsSumResponse {
  NdArray sum = 1;
}

message SubmitResultRequest {
  string run_id = 1;
  StepId step = 2;
  int32 aggregator_id = 3;
  bytes result_hash = 4;
  oneof result {
    BinsResult bins_result = 5;
    SplitsResult splits_result = 6;
    TreeResult tree_result = 7;
  }
}
message SubmitResultResponse {
  bool consensus_reached = 1;
}

message BinsResult {
  repeated BinConfiguration bins = 1;
  double initial_prediction = 2;
}
message SplitsResult {
  map<int32, SplitDecision> splits = 1;
}
message TreeResult {
  Tree tree = 1;
}

message GetConsensusBinsRequest {
  string run_id = 1;
}
message GetConsensusBinsResponse {
  repeated BinConfiguration bins = 1;
  double initial_prediction = 2;
  bool ready = 3;
}

message GetConsensusSplitsRequest {
  string run_id = 1;
  int32 round_id = 2;
  int32 depth = 3;
}
message GetConsensusSplitsResponse {
  map<int32, SplitDecision> splits = 1;
  bool ready = 2;
}

message GetConsensusModelRequest {
  string run_id = 1;
}
message GetConsensusModelResponse {
  Model model = 1;
}

message GetRunStateRequest {
  string run_id = 1;
}
message GetRunStateResponse {
  Phase phase = 1;
  int32 round_id = 2;
  int32 depth = 3;
  int32 expected_aggregators = 4;
  int32 received_results = 5;
}

// -- CoordinatorService --

service CoordinatorService {
  rpc CreateRun(CreateRunRequest) returns (CreateRunResponse);
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse);
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc GetRunConfig(GetRunConfigRequest) returns (GetRunConfigResponse);
}

message CreateRunRequest {
  TrainingConfig config = 1;
}
message CreateRunResponse {
  string run_id = 1;
}
message CancelRunRequest {
  string run_id = 1;
}
message CancelRunResponse {}
message ListRunsRequest {}
message ListRunsResponse {
  repeated RunInfo runs = 1;
}
message RunInfo {
  string run_id = 1;
  RunStatus status = 2;
}
enum RunStatus {
  RUN_ACTIVE = 0;
  RUN_CANCELLED = 1;
  RUN_COMPLETE = 2;
}
message GetRunConfigRequest {
  string run_id = 1;
}
message GetRunConfigResponse {
  TrainingConfig config = 1;
}

// -- Phase and step types --

enum Phase {
  WAITING_FOR_CLIENTS = 0;
  COLLECTING_STATS = 1;
  FROZEN_STATS = 2;
  COLLECTING_GRADIENTS = 3;
  FROZEN_GRADIENTS = 4;
  TRAINING_COMPLETE = 5;
}

message StepId {
  StepType step_type = 1;
  int32 round_id = 2;
  int32 depth = 3;
}

enum StepType {
  STATS = 0;
  GRADIENTS = 1;
}

// -- Training config --

message TrainingConfig {
  repeated FeatureSpec features = 1;
  string target_column = 2;
  string loss = 3;
  int32 n_bins = 4;
  int32 n_trees = 5;
  int32 max_depth = 6;
  double learning_rate = 7;
  double lambda_reg = 8;
  int32 min_clients = 9;
  oneof target {
    int32 target_count = 10;
    float target_fraction = 11;
  }
}

message FeatureSpec {
  int32 index = 1;
  string name = 2;
}

// -- Shared model messages --

message BinConfiguration {
  int32 feature_idx = 1;
  NdArray edges = 2;
  NdArray inner_edges = 3;
  int32 n_bins = 4;
}

message SplitDecision {
  int32 node_id = 1;
  int32 feature_idx = 2;
  double threshold = 3;
  double gain = 4;
  int32 left_child_id = 5;
  int32 right_child_id = 6;
}

message Model {
  double initial_prediction = 1;
  double learning_rate = 2;
  repeated Tree trees = 3;
}

message Tree {
  TreeNode root = 1;
}

message TreeNode {
  oneof node {
    SplitNode split = 1;
    LeafNode leaf = 2;
  }
}

message SplitNode {
  int32 feature_idx = 1;
  double threshold = 2;
  TreeNode left = 3;
  TreeNode right = 4;
}

message LeafNode {
  double value = 1;
}
