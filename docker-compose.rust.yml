services:
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.rust
    command: []
    entrypoint: ["coordinator"]
    environment:
      PORT: "50053"
    ports:
      - "50053:50053"

  shareholder-1:
    build:
      context: .
      dockerfile: Dockerfile.rust
    command: []
    entrypoint: ["shareholder"]
    environment:
      PORT: "50051"
      MIN_CLIENTS: "10"
      EXPECTED_AGGREGATORS: "3"
    ports:
      - "50061:50051"

  shareholder-2:
    build:
      context: .
      dockerfile: Dockerfile.rust
    command: []
    entrypoint: ["shareholder"]
    environment:
      PORT: "50051"
      MIN_CLIENTS: "10"
      EXPECTED_AGGREGATORS: "3"
    ports:
      - "50062:50051"

  shareholder-3:
    build:
      context: .
      dockerfile: Dockerfile.rust
    command: []
    entrypoint: ["shareholder"]
    environment:
      PORT: "50051"
      MIN_CLIENTS: "10"
      EXPECTED_AGGREGATORS: "3"
    ports:
      - "50063:50051"

  aggregator-1:
    build:
      context: .
      dockerfile: Dockerfile.rust
    command: []
    entrypoint: ["aggregator"]
    environment:
      AGGREGATOR_ID: "1"
      SHAREHOLDERS: "shareholder-1:50051,shareholder-2:50051,shareholder-3:50051"
      THRESHOLD: "2"
      N_BINS: "10"
      N_TREES: "15"
      MAX_DEPTH: "3"
      LEARNING_RATE: "0.15"
      LAMBDA_REG: "2.0"
      MIN_CLIENTS: "10"
      RUN_ID: "default"
    depends_on:
      - shareholder-1
      - shareholder-2
      - shareholder-3

  aggregator-2:
    build:
      context: .
      dockerfile: Dockerfile.rust
    command: []
    entrypoint: ["aggregator"]
    environment:
      AGGREGATOR_ID: "2"
      SHAREHOLDERS: "shareholder-1:50051,shareholder-2:50051,shareholder-3:50051"
      THRESHOLD: "2"
      N_BINS: "10"
      N_TREES: "15"
      MAX_DEPTH: "3"
      LEARNING_RATE: "0.15"
      LAMBDA_REG: "2.0"
      MIN_CLIENTS: "10"
      RUN_ID: "default"
    depends_on:
      - shareholder-1
      - shareholder-2
      - shareholder-3

  aggregator-3:
    build:
      context: .
      dockerfile: Dockerfile.rust
    command: []
    entrypoint: ["aggregator"]
    environment:
      AGGREGATOR_ID: "3"
      SHAREHOLDERS: "shareholder-1:50051,shareholder-2:50051,shareholder-3:50051"
      THRESHOLD: "2"
      N_BINS: "10"
      N_TREES: "15"
      MAX_DEPTH: "3"
      LEARNING_RATE: "0.15"
      LAMBDA_REG: "2.0"
      MIN_CLIENTS: "10"
      RUN_ID: "default"
    depends_on:
      - shareholder-1
      - shareholder-2
      - shareholder-3
